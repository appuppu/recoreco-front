name: SugarBeat
options:
  bundleIdPrefix: com.sugarbeat
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: ja

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  SugarBeat:
    type: application
    platform: iOS
    sources:
      - path: SugarBeat
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sugarbeat.SugarBeat
        INFOPLIST_FILE: SugarBeat/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "M86QCKBHW8"
        CODE_SIGN_ENTITLEMENTS: SugarBeat/SugarBeat.entitlements
    entitlements:
      path: SugarBeat/SugarBeat.entitlements
    dependencies: []
